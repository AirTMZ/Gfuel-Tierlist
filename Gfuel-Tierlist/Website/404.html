<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // Preserve the original URL path for our client-side router
    sessionStorage.setItem('redirectPath', window.location.pathname);
    // Redirect to the main page
    window.location.href = '/';
  </script>
</head>

<body>
  <p>Redirecting...</p>
</body>

</html>
